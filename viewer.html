<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Markdown rendered content styles */
        .md-content h1 { font-size: 20px; letter-spacing: 0.4px; font-weight: 600; margin-bottom: 6px; line-height: 1.3; }
        .md-content h2 { font-size: 15px; font-weight: 600; letter-spacing: 0.25px; margin-bottom: 6px; color: var(--muted); }
        .md-content p { margin-bottom: 14px; }
        .md-content img { max-width: 100%; border-radius: 4px; margin: 12px 0; }
        .md-content ul, .md-content ol { padding-left: 24px; margin-bottom: 14px; color: var(--muted); }
        .md-content li { margin-bottom: 4px; }
        .md-content blockquote { border-left: 2px solid var(--border); padding-left: 16px; color: var(--muted2); margin: 14px 0; }
        .md-content code { font-family: inherit; background: rgba(128,128,128,0.1); padding: 2px 5px; border-radius: 3px; font-size: 12px; }
        .md-content pre { background: rgba(128,128,128,0.1); padding: 14px; border-radius: 4px; overflow-x: auto; margin: 14px 0; }
        .md-content pre code { background: none; padding: 0; }
        .md-content hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
    </style>
    <link rel="icon" type="image/png" href="Yipin photo.png">
</head>
<body>
    <a href="index.html" class="back-link">← 回首頁</a>
    <div id="content" class="md-content"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');

        if (file) {
            fetch(file)
                .then(res => {
                    if (!res.ok) throw new Error('File not found');
                    return res.text();
                })
                .then(md => {
                    document.getElementById('content').innerHTML = marked.parse(md);
                    // Set page title from first h1
                    const h1 = document.querySelector('.md-content h1');
                    if (h1) document.title = h1.textContent;
                })
                .catch(() => {
                    document.getElementById('content').innerHTML = '<p>找不到檔案。</p>';
                    document.title = 'Error';
                });
        } else {
            document.getElementById('content').innerHTML = '<p>未指定檔案。</p>';
        }
    </script>
</body>
</html>
